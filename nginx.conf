user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main  '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log  main;
    sendfile on;
    # tcp_nopush     on;
    keepalive_timeout 65;
    # gzip  on;
    include /etc/nginx/conf.d/*.conf;
    # #################  Home  ###################

    server {
        server_name johanbrown.com;
    
        location / {
            root /usr/share/nginx/johanbrown.com;
            try_files $uri $uri/ =404;
        }
    

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/johanbrown.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/johanbrown.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

    # ############   www Redirect to JohanBrown.com  ##############

    server {
        server_name www.johanbrown.com;
        # $scheme will get the http protocol
        # and 301 is best practice for tablet, phone, desktop and seo
        return 301 $scheme://johanbrown.com$request_uri;
    

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/johanbrown.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/johanbrown.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

    # ############  olibrary.johanbrown.com  ##############

    server {
        server_name olibrary.johanbrown.com;
    
        location / {
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header Host $http_host;
            proxy_http_version 1.1;
            proxy_pass "http://127.0.0.1:8083/";
            # No cookie path necessary here
            # No cookie path necessary here
            proxy_connect_timeout 150;
            proxy_send_timeout 150;
            proxy_read_timeout 150;
            send_timeout 150;
            client_max_body_size 500M;
        }

    
        location /statistics/ {
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            proxy_pass "http://127.0.0.1:8086/";
        }

    
        location /statistics/_stcore/stream {
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
            proxy_pass "http://127.0.0.1:8086/_stcore/stream";
        }
    

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/johanbrown.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/johanbrown.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

